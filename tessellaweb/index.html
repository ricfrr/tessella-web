</head>
<body>
<div id="root"></div>

<script>
(async () => {
  const wait = (ms) => new Promise(r => setTimeout(r, ms));
  // wait until Babel + React are loaded
  while (!window.Babel || !window.React || !window.ReactDOM) await wait(50);
  for (const f of ["tweaks-panel.jsx", "app.jsx"]) {
    try {
      const src = await fetch(f).then(r => r.text());
      const out = Babel.transform(src, { presets: ["react"] }).code;
      const s = document.createElement("script");
      s.text = out;
      document.body.appendChild(s);
    } catch (e) { console.error("Failed to load " + f, e); }
  }
})();
</script>
</body>
