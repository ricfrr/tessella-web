<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>tessel·la</title>
<meta name="description" content="tessel·la, Building joyful robot experiences." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23cb4b16'/%3E%3C/svg%3E" />

<style>
/* ==========================================================
   tessel·la v2 — minimal, type-led, one accent
   ========================================================== */
:root {
  --sol-base03:  #002b36;
  --sol-base02:  #073642;
  --sol-base01:  #586e75;
  --sol-base00:  #657b83;
  --sol-base0:   #839496;
  --sol-base1:   #93a1a1;
  --sol-base2:   #eee8d5;
  --sol-base3:   #fdf6e3;
  --sol-green:   #859900;
  --sol-orange:  #cb4b16;
  --sol-violet:  #6c71c4;

  --accent:      var(--sol-orange);
  --accent-soft: #e07b4b;
  --accent-deep: #a13a10;
  --accent-2:    var(--sol-violet);

  --bg:          var(--sol-base3);
  --paper:       #fffaf0;
  --ink:         var(--sol-base02);
  --ink-soft:    var(--sol-base01);
  --ink-mute:    var(--sol-base00);
  --hairline:      rgba(7,54,66,.12);
  --hairline-soft: rgba(7,54,66,.06);
  --dot-grid:      rgba(7,54,66,.18);

  --display: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
  --mono:    "JetBrains Mono", ui-monospace, monospace;
  --r-sm: 8px; --r: 14px; --r-lg: 22px;
}

[data-theme="dark"] {
  --bg:          var(--sol-base03);
  --paper:       var(--sol-base02);
  --ink:         var(--sol-base2);
  --ink-soft:    var(--sol-base1);
  --ink-mute:    var(--sol-base0);
  --hairline:      rgba(238,232,213,.12);
  --hairline-soft: rgba(238,232,213,.06);
  --dot-grid:      rgba(147,161,161,.20);
  --accent:      #d4763d;
  --accent-soft: #e89a6d;
  --accent-deep: #f0b48c;
  --accent-2:    #8d92d8;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--ink);
  font-family: var(--display);
  font-size: 16px; line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

a { color: inherit; }

body::before {
  content: "";
  position: fixed; inset: 0;
  background-image: radial-gradient(var(--dot-grid) 1px, transparent 1.4px);
  background-size: 28px 28px;
  pointer-events: none; z-index: 0;
  mask-image: radial-gradient(circle at 50% 30%, black 0%, transparent 85%);
  -webkit-mask-image: radial-gradient(circle at 50% 30%, black 0%, transparent 85%);
}

main, header, footer, section { position: relative; z-index: 1; }

h1, h2, h3 { font-family: var(--display); font-weight: 500; letter-spacing: -0.02em; margin: 0; }
h2 { font-size: clamp(28px,3.4vw,44px); line-height: 1.06; letter-spacing: -0.025em; }
h3 { font-size: 19px; line-height: 1.25; }
p  { margin: 0; color: var(--ink-soft); }

.eyebrow {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-mute);
  display: inline-flex; align-items: center; gap: 10px;
}
.eyebrow::before { content: ""; width: 18px; height: 1px; background: var(--ink-mute); }

.wrap { max-width: 1120px; margin: 0 auto; padding: 0 32px; }

/* --- Header --- */
.site-header {
  position: sticky; top: 0; z-index: 50;
  background: color-mix(in oklch, var(--bg) 80%, transparent);
  backdrop-filter: blur(12px) saturate(1.1);
  -webkit-backdrop-filter: blur(12px) saturate(1.1);
  border-bottom: 1px solid var(--hairline-soft);
}
.nav {
  max-width: 1120px; margin: 0 auto; padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.brand {
  font-family: var(--display); font-weight: 500; font-size: 18px;
  letter-spacing: -0.025em; text-decoration: none; color: var(--ink);
  display: inline-flex; align-items: center; line-height: 1;
}
.brand .dot-mini {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; background: var(--accent);
  animation: miniHop 3.6s ease-in-out infinite;
}
@keyframes miniHop {
  0%,100% { transform: translateY(0) scale(1); background: var(--accent); }
  25%     { transform: translateY(-3px) scale(0.9); }
  50%     { transform: translateY(0) scale(1.15); background: var(--accent-2); }
  75%     { transform: translateY(2px) scale(0.9); }
}

.nav-links {
  display: flex; align-items: center; gap: 4px;
  list-style: none; margin: 0; padding: 0;
}
.nav-links a {
  font-size: 14px; font-weight: 500; text-decoration: none;
  color: var(--ink-soft); padding: 8px 14px; border-radius: 999px;
  transition: color .2s;
}
.nav-links a:hover { color: var(--ink); }

.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--hairline); background: transparent; cursor: pointer;
  display: inline-grid; place-items: center; color: var(--ink-soft);
  transition: color .2s, border-color .2s;
}
.theme-toggle:hover { color: var(--ink); border-color: var(--ink-soft); }

@media (max-width: 720px) { .nav-links li:not(.always) { display: none; } }

/* --- Hero --- */
.hero {
  min-height: calc(100vh - 64px);
  display: grid; place-items: center;
  padding: 40px 32px 80px; position: relative;
  text-align: center;
}

.wordmark {
  font-family: var(--display); font-weight: 500;
  font-size: clamp(72px,16vw,220px);
  letter-spacing: -0.05em; line-height: 0.9; color: var(--ink);
  text-align: center; position: relative;
  display: inline-flex; align-items: center; white-space: nowrap;
}

/* dot — flat, bold, unmissable */
.dot-stage {
  position: relative; display: inline-block;
  width: 0.18em; height: 0.9em;
  margin: 0 0.04em; vertical-align: middle;
}
.dot-stage .orbit, .dot-stage .orbit.b, .dot-stage .sat { display: none; }

.dot-stage .dot {
  position: absolute; left: 50%; top: 50%;
  width: 0.22em; height: 0.22em; border-radius: 50%;
  background: var(--accent);
  transform: translate(-50%,-50%);
  animation:
    dotEntry 1.4s cubic-bezier(.16,1,.3,1) 0.2s both,
    dotIdle  3.2s ease-in-out 1.6s infinite;
}
.dot-stage .dot::after {
  content: ""; position: absolute; inset: -4px; border-radius: 50%;
  border: 2px solid var(--accent); opacity: 0;
  animation: dotPing 3.2s ease-out 1.6s infinite;
}
/* When the canvas dot detaches, fade the CSS dot out */
.dot-stage .dot,
.dot-stage .dot::after {
  transition: opacity 0.4s ease;
}
.dot-detached .dot-stage .dot { opacity: 0 !important; animation-play-state: paused; }
.dot-detached .dot-stage .dot::after { opacity: 0 !important; }

@keyframes dotEntry {
  0%   { transform: translate(-260%,-50%) scale(0.2); opacity: 0; }
  40%  { transform: translate(-50%,-50%) scale(1.7); opacity: 1; }
  60%  { transform: translate(-50%,-130%) scale(0.8); }
  78%  { transform: translate(-50%,-50%) scale(1.2); }
  100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
}
@keyframes dotIdle {
  0%,32%,100% { transform: translate(-50%,-50%) scale(1);    background: var(--accent); }
  42%         { transform: translate(-50%,-150%) scale(0.75); background: var(--accent-2); }
  54%         { transform: translate(-50%,-50%) scale(1.45); }
  66%         { transform: translate(-50%,50%) scale(0.75); }
  82%         { transform: translate(-50%,-50%) scale(1.15); background: var(--accent); }
}
@keyframes dotPing {
  0%,32%,100% { transform: scale(1);   opacity: 0; }
  42%         { transform: scale(1);   opacity: 0.75; }
  82%         { transform: scale(3.2); opacity: 0; }
}

.hero-sub {
  margin-top: 32px; font-size: clamp(15px,1.3vw,17px);
  color: var(--ink-soft); text-align: center;
  max-width: 52ch; margin-left: auto; margin-right: auto;
}
.hero-meta {
  margin-top: 28px; display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 11px; color: var(--ink-mute); letter-spacing: 0.08em;
}
.hero-meta span { display: inline-flex; align-items: center; gap: 8px; }
.hero-meta i.led {
  width: 6px; height: 6px; border-radius: 50%; background: var(--sol-green);
  animation: blink 2.4s ease-in-out infinite;
}
@keyframes blink {
  0%,60%,100% { opacity: 1; } 65%,75% { opacity: 0.3; }
}

.scroll-cue {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 10px; color: var(--ink-mute);
  letter-spacing: 0.2em; text-transform: uppercase;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.scroll-cue::after {
  content: ""; width: 1px; height: 28px;
  background: linear-gradient(180deg, var(--ink-mute), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse {
  0%   { transform: scaleY(0.3); transform-origin: top; opacity: 0.4; }
  50%  { transform: scaleY(1); opacity: 1; }
  100% { transform: scaleY(0.3); transform-origin: bottom; opacity: 0.4; }
}

/* --- Canvas thread --- */
.constellation {
  position: fixed; inset: 0; pointer-events: none; z-index: 2; opacity: 0.9;
}

/* --- Sections --- */
section { padding: 120px 0; }
@media (max-width: 720px) { section { padding: 80px 0; } }

.section-head {
  display: grid; grid-template-columns: 1fr 1.2fr;
  gap: 48px; margin-bottom: 56px; align-items: end;
}
@media (max-width: 720px) {
  .section-head { grid-template-columns: 1fr; gap: 24px; margin-bottom: 36px; }
}
.section-head .titles h2 { margin-top: 12px; }
.section-head .lede { font-size: 17px; color: var(--ink-soft); max-width: 50ch; }

/* --- Projects --- */
.project {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 56px; align-items: center;
  padding: 28px 0; border-top: 1px solid var(--hairline);
}
@media (max-width: 860px) { .project { grid-template-columns: 1fr; gap: 28px; } }

.project-meta { display: flex; flex-direction: column; gap: 16px; }
.project-meta .num {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; color: var(--ink-mute);
}
.project-meta h3 { font-size: clamp(28px,3vw,40px); font-weight: 500; letter-spacing: -0.025em; line-height: 1.05; }
.project-meta p  { font-size: 16px; }

.project-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.project-tags span {
  font-family: var(--mono); font-size: 11px;
  padding: 4px 10px; border-radius: 999px;
  border: 1px solid var(--hairline); color: var(--ink-soft);
}
.project-cta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }

.media {
  position: relative; border-radius: var(--r-lg); overflow: hidden;
  background: oklch(0.10 0.02 245); aspect-ratio: 16/10;
  border: 1px solid var(--hairline);
  box-shadow: 0 30px 60px -30px oklch(0.2 0.05 240 / 0.4);
}
.media video, .media img { width: 100%; height: 100%; object-fit: cover; display: block; }
.media .scan {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(180deg, transparent 0 2px, oklch(0 0 0/.12) 2px 3px);
  pointer-events: none; mix-blend-mode: multiply; opacity: 0.35;
}
.media .play-overlay {
  position: absolute; inset: 0; display: grid; place-items: center;
  cursor: pointer; background: oklch(0 0 0/.25); transition: background .25s;
}
.media .play-overlay:hover { background: oklch(0 0 0/.15); }
.media .play-btn {
  width: 76px; height: 76px; border-radius: 50%;
  background: oklch(1 0 0/.15); border: 1px solid oklch(1 0 0/.5);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  display: grid; place-items: center; transition: transform .2s, background .2s;
}
.media .play-overlay:hover .play-btn { transform: scale(1.08); background: oklch(1 0 0/.25); }
.media .play-btn::before {
  content: ""; width: 0; height: 0;
  border-left: 18px solid white;
  border-top: 12px solid transparent; border-bottom: 12px solid transparent;
  margin-left: 6px;
}
.media.playing .play-overlay { display: none; }

/* --- Buttons --- */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  height: 42px; padding: 0 20px;
  border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
  font-family: var(--display); font-weight: 500; font-size: 14px;
  border-radius: 999px; cursor: pointer; text-decoration: none;
  transition: transform .15s, opacity .2s, background .2s, color .2s;
}
.btn:hover { transform: translateY(-1px); }
.btn--ghost { background: transparent; color: var(--ink); border-color: var(--hairline); }
.btn--ghost:hover { border-color: var(--ink); }
.btn--accent { background: var(--accent); border-color: var(--accent); color: var(--paper); }
.btn--accent:hover { background: var(--accent-deep); border-color: var(--accent-deep); }

/* --- About --- */
.about { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: start; }
@media (max-width: 860px) { .about { grid-template-columns: 1fr; gap: 28px; } }
.about p { font-size: 17px; line-height: 1.65; color: var(--ink-soft); }
.about p + p { margin-top: 14px; }
.about p strong { color: var(--ink); font-weight: 500; }
.about .more { margin-top: 22px; }

.principles { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 20px; }
.principles li {
  display: grid; grid-template-columns: 28px 1fr; gap: 14px; align-items: start;
  padding: 18px 0; border-top: 1px solid var(--hairline);
}
.principles li:first-child { border-top: 0; padding-top: 0; }
.principles .num { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 0.05em; padding-top: 2px; }
.principles h4 { margin: 0 0 4px; font-size: 17px; font-weight: 500; letter-spacing: -0.015em; }
.principles p { font-size: 14px; }

/* --- Contact --- */
.contact {
  display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;
  padding: 64px 0; border-top: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline);
}
@media (max-width: 860px) { .contact { grid-template-columns: 1fr; gap: 32px; padding: 40px 0; } }
.contact h2 { margin-top: 12px; }
.contact-form { display: flex; flex-direction: column; gap: 12px; }
.contact-form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 540px) { .contact-form .row { grid-template-columns: 1fr; } }
.contact-form input, .contact-form textarea {
  width: 100%; font-family: var(--display); font-size: 15px;
  padding: 14px 16px; border-radius: var(--r); border: 1px solid var(--hairline);
  background: transparent; color: var(--ink); outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.contact-form input::placeholder, .contact-form textarea::placeholder { color: var(--ink-mute); }
.contact-form textarea { min-height: 120px; resize: vertical; }
.contact-form input:focus, .contact-form textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px color-mix(in oklch, var(--accent) 18%, transparent);
}

/* --- Footer --- */
footer { padding: 48px 0 56px; border-top: 1px solid var(--hairline-soft); }
.footer-grid {
  display: flex; justify-content: space-between; align-items: center;
  gap: 24px; flex-wrap: wrap; font-size: 13px; color: var(--ink-mute);
}
.footer-brand { display: flex; align-items: center; gap: 14px; }
.footer-logo { height: 32px; width: auto; opacity: 0.75; filter: grayscale(0.2); transition: opacity .2s; }
.footer-logo:hover { opacity: 1; }
.footer-links { display: flex; gap: 22px; }
.footer-links a {
  color: var(--ink-mute); text-decoration: none;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  transition: color .2s;
}
.footer-links a:hover { color: var(--accent); }

/* --- Reveal --- */
.reveal { opacity: 0; transform: translateY(14px); transition: opacity .8s ease, transform .8s ease; }
.reveal.in { opacity: 1; transform: none; }

/* --- Toast --- */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 10px 16px; border-radius: 999px;
  font-family: var(--mono); font-size: 12px;
  background: var(--ink); color: var(--paper);
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s; z-index: 100;
  display: inline-flex; align-items: center; gap: 8px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

:root { color-scheme: light; }
[data-theme="dark"] { color-scheme: dark; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

<script src="vendor/react.js"></script>
<script src="vendor/react-dom.js"></script>
<script src="vendor/babel.js"></script>
</head>
<body>
<div id="root"></div>

<!-- tweaks-panel helpers (must load before app) -->
<script type="text/babel" data-presets="react">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === "object" ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*");
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = "Tweaks", children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === "__activate_edit_mode") setOpen(true);
      else if (t === "__deactivate_edit_mode") setOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd"><b>{title}</b>
          <button className="twk-x" onClick={() => { setOpen(false); window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*"); }}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === "object" ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (cx) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((cx - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up); };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
  };
  return (
    <div>
      {label && <div className="twk-lbl"><span>{label}</span></div>}
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? "twk-seg dragging" : "twk-seg"}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </div>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRadio });
</script>

/* Constellation — thread + viewport-pinned traveling dot.
   The dot stays at 42% from the top of the viewport at all times,
   while its x follows the thread's horizontal path at that y position. */
function Constellation() {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let anchors = [];
    let raf = 0;

    const readAccent = () =>
      getComputedStyle(document.documentElement).getPropertyValue("--accent").trim() || "#cb4b16";

    const resize = () => {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width  = window.innerWidth  + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildAnchors();
    };

    const buildAnchors = () => {
      const sels = ["#projects", "#about", "#contact", "footer"];
      const cx = window.innerWidth / 2;
      const sway = Math.min(window.innerWidth * 0.18, 220);
      anchors = [];

      // First anchor: the wordmark dot itself, so the thread spawns from it
      const dotEl = document.querySelector(".dot-stage");
      if (dotEl) {
        const r = dotEl.getBoundingClientRect();
        const ax = r.left + r.width  * 0.5;
        const ay = r.top  + r.height * 0.5 + window.scrollY;
        anchors.push({ ax, ay, x: ax, y: ay, vx: 0, vy: 0 });
      }

      sels.forEach((sel) => {
        document.querySelectorAll(sel).forEach((el) => {
          const rect = el.getBoundingClientRect();
          const absY = rect.top + window.scrollY + rect.height * 0.5;
          const sign = (anchors.length % 2 === 0) ? -1 : 1;
          const x = cx + sign * sway * (0.4 + 0.6 * Math.sin(anchors.length * 1.3));
          anchors.push({ ax: x, ay: absY, x, y: absY, vx: 0, vy: 0 });
        });
      });
    };

    const tick = () => {
      const sy = window.scrollY;
      const vh = window.innerHeight;
      const accent = readAccent();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const a of anchors) {
        const screenY = a.ay - sy;
        if (screenY < -200 || screenY > vh + 200) {
          a.x = a.ax; a.y = a.ay; a.vx = 0; a.vy = 0; continue;
        }
        a.vx = (a.vx + (a.ax - a.x) * 0.06) * 0.82;
        a.vy = (a.vy + (a.ay - a.y) * 0.06) * 0.82;
        a.x += a.vx; a.y += a.vy;
      }

      // Draw thread
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.22;
      for (let i = 0; i < anchors.length - 1; i++) {
        const a = anchors[i], b = anchors[i + 1];
        const ay = a.y - sy, by = b.y - sy;
        if ((ay < -50 && by < -50) || (ay > vh + 50 && by > vh + 50)) continue;
        const my = (ay + by) / 2;
        ctx.beginPath();
        ctx.moveTo(a.x, ay);
        ctx.bezierCurveTo(a.x, my, b.x, my, b.x, by);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Traveling dot — viewport-pinned y, x follows thread
      if (anchors.length >= 2) {
        // All y positions in viewport space (same coords the bezier is drawn in)
        const avys = anchors.map(a => a.y - sy);
        const firstVY = avys[0];
        const lastVY  = avys[avys.length - 1];

        // Target y drifts from firstVY (top) → 42% (middle) → lastVY (bottom)
        // so the dot starts at the line beginning, rides it, and ends at the line end.
        const docH = Math.max(1, document.documentElement.scrollHeight - vh);
        const sf = Math.min(1, Math.max(0, sy / docH));
        const top    = Math.min(1, sf / 0.12);          // 0→1 over first 12% of scroll
        const bottom = Math.max(0, (sf - 0.88) / 0.12); // 0→1 over last  12% of scroll
        const targetVY = firstVY  * (1 - top)
                       + vh * 0.42 * (top - bottom)
                       + lastVY   * bottom;
        const clampedVY = Math.max(firstVY, Math.min(lastVY, targetVY));

        let px = anchors[0].x;
        if (clampedVY <= firstVY) {
          px = anchors[0].x;
        } else if (clampedVY >= lastVY) {
          px = anchors[anchors.length - 1].x;
        } else {
          for (let i = 0; i < anchors.length - 1; i++) {
            const ay = avys[i], by = avys[i + 1];
            if (clampedVY >= ay && clampedVY <= by) {
              const my = (ay + by) / 2;
              // Binary search: find bezier parameter t where y_bezier(t) = clampedVY.
              // y(t) = (1-t)³·ay + 3t(1-t)·my + t³·by  (cubic in t, not linear)
              let lo = 0, hi = 1;
              for (let k = 0; k < 14; k++) {
                const tm = (lo + hi) / 2;
                const u  = 1 - tm;
                if (u*u*u*ay + 3*tm*u*my + tm*tm*tm*by < clampedVY) lo = tm; else hi = tm;
              }
              const t = (lo + hi) / 2;
              px = (1-t)*(1-t)*(1+2*t)*anchors[i].x + t*t*(3-2*t)*anchors[i+1].x;
              break;
            }
          }
        }

        // Fade canvas dot in as it detaches from the wordmark (0→1 over first 80px of scroll)
        ctx.globalAlpha = Math.min(1, sy / 80);
        ctx.fillStyle = accent;
        ctx.beginPath();
        ctx.arc(px, clampedVY, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      raf = requestAnimationFrame(tick);
    };

    // Toggle CSS dot visibility in sync with canvas dot
    const DETACH_PX = 40;
    const onScroll = () => {
      document.body.classList.toggle("dot-detached", window.scrollY > DETACH_PX);
    };

    resize();
    raf = requestAnimationFrame(tick);
    window.addEventListener("resize", resize);
    window.addEventListener("scroll", onScroll, { passive: true });
    const t1 = setTimeout(buildAnchors, 400);
    const t2 = setTimeout(buildAnchors, 1500);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
      window.removeEventListener("scroll", onScroll);
      clearTimeout(t1); clearTimeout(t2);
    };
  }, []);

  return <canvas className="constellation" ref={canvasRef} aria-hidden="true"/>;
}

function MyTweaks({ tweaks, setTweak }) {
  if (typeof TweaksPanel === "undefined") return null;
  return (
    <TweaksPanel>
      <TweakSection label="Theme"/>
      <TweakRadio
        value={tweaks.theme}
        onChange={(v) => setTweak("theme", v)}
        options={[{ value:"light", label:"Light" }, { value:"dark", label:"Dark" }]}
      />
    </TweaksPanel>
  );
}

function App() {
  const tweaksHook = (typeof useTweaks === "function") ? useTweaks(TWEAKS_DEFAULTS) : null;
  const [localTweaks, setLocalTweaks] = useState(TWEAKS_DEFAULTS);
  const T = tweaksHook ? tweaksHook[0] : localTweaks;
  const setT = tweaksHook ? tweaksHook[1] : (a, b) =>
    setLocalTweaks((prev) => typeof a === "object" ? { ...prev, ...a } : { ...prev, [a]: b });

  const [theme, setTheme] = useState(() => localStorage.getItem("tessella-theme") || T.theme || "light");
  const [toast, setToast] = useState(null);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("tessella-theme", theme);
  }, [theme]);

  useEffect(() => { if (T.theme && T.theme !== theme) setTheme(T.theme); }, [T.theme]);

  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } }),
      { threshold: 0.12 }
    );
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Header theme={theme} setTheme={setTheme}/>
      <Constellation/>
      <main>
        <Hero/>
        <Projects/>
        <About/>
        <Contact/>
      </main>
      <Footer/>
      <Toast message={toast}/>
      <MyTweaks tweaks={T} setTweak={setT}/>
    </>
  );
}
